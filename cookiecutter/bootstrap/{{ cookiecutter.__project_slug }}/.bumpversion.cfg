[bumpversion]
current_version = {{ cookiecutter.version }}
commit = False
tag = False
parse = (?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)(\.(?P<release>[a-z]+))?
serialize = 
	{major}.{minor}.{patch}.{release}
	{major}.{minor}.{patch}

[bumpversion:part:release]
optional_value = prod
first_value = dev
values = 
	dev
	prod
{%- if cookiecutter.glue %}

[bumpversion:file:./pulp-glue{{ cookiecutter.__app_label_suffix }}/pulp_glue/common/__init__.py]
{%- endif %}

[bumpversion:file:./pulpcore/cli/{{ cookiecutter.app_label }}/__init__.py]
{%- if cookiecutter.glue %}

[bumpversion:file:./pulp-glue{{ cookiecutter.__app_label_suffix }}/pyproject.toml]
{%- endif %}

[bumpversion:file:./pyproject.toml]
{%- if cookiecutter.docs %}

[bumpversion:file:./mkdocs.yml]
{%- endif %}
