{%- import 'macros' as macros with context -%}
---
name: "Collect changes"
on:
  workflow_call:
  workflow_dispatch:

jobs:
  collect-changes:
    runs-on: "ubuntu-latest"
    steps:
      {{ macros.checkout(deep=true) | indent(6) }}
      {{ macros.setup_python() | indent(6) }}
      {{ macros.install_uv() | indent(6) }}
      {{ macros.setup_git() | indent(6) }}
      - name: "Collect changes"
        run: |
          uv run --script .ci/scripts/collect_changes.py
      {%- raw %}
      - name: "Create Pull Request"
        uses: "peter-evans/create-pull-request@v8"
        id: "create_pr"
        with:
          token: "${{ secrets.RELEASE_TOKEN }}"
          title: "Update Changelog"
          body: ""
          branch: "update_changes"
          delete-branch: true
      - name: "Mark PR automerge"
        run: |
          gh pr merge --rebase --auto "${{ steps.create_pr.outputs.pull-request-number }}"
        if: "steps.create_pr.outputs.pull-request-number"
        env:
          GH_TOKEN: "${{ secrets.RELEASE_TOKEN }}"
        continue-on-error: true
      {%- endraw %}
...
